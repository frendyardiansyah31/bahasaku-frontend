openapi: 3.0.3

info:
  title: BahasaKu API
  version: 1.0.0
  description: API platform latihan Bahasa Indonesia adaptif untuk mahasiswa asing UIII.

servers:
  - url: http://localhost:8000
    description: Local Development
  - url: https://frendyardiansyah31-bahasaku-backend.hf.space
    description: Production (Hugging Face Spaces)

tags:
  - name: Auth
    description: Register, login, logout, refresh token
  - name: Onboarding
    description: Pengisian data awal setelah register
  - name: Dashboard
    description: Data utama beranda user
  - name: Quiz
    description: Sesi latihan soal adaptif

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── AUTH ─────────────────────────────────────────────────────────────────

    UserObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ahmad Khalid
        email:
          type: string
          example: ahmad@uiii.ac.id
        role:
          type: string
          enum: [user, instructor, admin]
          example: user
        is_onboarded:
          type: boolean
          example: false
        country:
          type: string
          nullable: true
          example: Saudi Arabia
        initial_level:
          type: string
          nullable: true
          enum: [A1, A2]
          example: A1

    OnboardingRequest:
      type: object
      required: [country, initial_level]
      properties:
        country:
          type: string
          example: Saudi Arabia
        initial_level:
          type: string
          enum: [A1, A2]
          example: A1

    # ── DASHBOARD ────────────────────────────────────────────────────────────

    SkillCard:
      type: object
      properties:
        skill:
          type: string
          enum: [kosakata, grammar, menyimak]
          example: kosakata
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 78
        delta_this_week:
          type: integer
          description: Perubahan skor minggu ini. Positif = naik, negatif = turun, 0 = tidak ada perubahan
          example: 5
        status:
          type: string
          enum: [Mulai latihan, Perlu latihan, Bagus, Kuasai]
          example: Bagus

    StreakDay:
      type: object
      properties:
        day:
          type: string
          description: Nama hari singkat — Sen, Sel, Rab, Kam, Jum, Sab, Min
          example: Sen
        date:
          type: string
          format: date
          example: "2026-04-21"
        is_active:
          type: boolean
          description: true jika user berlatih di hari ini
          example: true

    RecommendedTopic:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: Kata Sambung
        skill:
          type: string
          enum: [kosakata, grammar, menyimak]
          example: kosakata
        total_questions:
          type: integer
          example: 10
        estimated_minutes:
          type: integer
          example: 8

    ActivitySummary:
      type: object
      properties:
        sessions_this_week:
          type: integer
          example: 7
        total_questions_answered:
          type: integer
          example: 143
        average_score:
          type: integer
          minimum: 0
          maximum: 100
          example: 82
        cefr_level:
          type: string
          example: B1
        cefr_label:
          type: string
          example: Menengah
        strongest_skill:
          type: string
          nullable: true
          enum: [kosakata, grammar, menyimak]
          example: kosakata
        xp_today:
          type: integer
          example: 80

    DashboardResponse:
      type: object
      properties:
        greeting:
          type: object
          properties:
            name:
              type: string
              example: Andi
            date:
              type: string
              example: Kamis, 23 April 2026
            new_topics_count:
              type: integer
              example: 3
        level:
          type: object
          properties:
            cefr:
              type: string
              example: B1
            label:
              type: string
              example: Menengah
            total_xp:
              type: integer
              example: 1240
            next_level_xp:
              type: integer
              example: 2000
            xp_remaining:
              type: integer
              example: 620
        streak:
          type: object
          properties:
            count:
              type: integer
              example: 4
            days:
              type: array
              items:
                $ref: "#/components/schemas/StreakDay"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillCard"
        recommended_topics:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedTopic"
        activity_summary:
          $ref: "#/components/schemas/ActivitySummary"

    # ── QUIZ ─────────────────────────────────────────────────────────────────

    QuestionOption:
      type: object
      properties:
        key:
          type: string
          description: Huruf pilihan jawaban
          example: A
        value:
          type: string
          description: Teks pilihan jawaban
          example: Nasi goreng dimasak oleh ibu untuk sarapan.

    Question:
      type: object
      properties:
        id:
          type: integer
          example: 12
        order:
          type: integer
          description: Urutan soal dalam sesi ini
          example: 1
        type:
          type: string
          enum: [multiple_choice, fill_blank, drag_drop]
          example: multiple_choice
        skill:
          type: string
          enum: [kosakata, grammar, menyimak]
          example: grammar
        text:
          type: string
          description: Teks utama soal
          example: "Pilih kalimat pasif yang paling tepat untuk kalimat aktif berikut:"
        context:
          type: string
          nullable: true
          description: Kalimat konteks atau kutipan yang ditampilkan dengan styling italic. Null jika tidak ada.
          example: '"Ibu memasak nasi goreng untuk sarapan."'
        options:
          type: array
          nullable: true
          description: Hanya ada jika type = multiple_choice
          items:
            $ref: "#/components/schemas/QuestionOption"
        words:
          type: array
          nullable: true
          description: Hanya ada jika type = drag_drop — kata-kata yang perlu disusun
          items:
            type: string
          example: ["harganya", "Berapa", "Pak", "?"]

    StartSessionResponse:
      type: object
      properties:
        session_id:
          type: integer
          example: 42
        topic:
          type: object
          properties:
            id:
              type: integer
              example: 5
            name:
              type: string
              example: Kalimat Pasif
            skill:
              type: string
              enum: [kosakata, grammar, menyimak]
              example: grammar
            level:
              type: string
              example: B1 Menengah
        total_questions:
          type: integer
          example: 5
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"

    AnswerRequest:
      type: object
      required: [session_id, question_id, answer]
      properties:
        session_id:
          type: integer
          example: 42
        question_id:
          type: integer
          example: 12
        answer:
          description: |
            Format berbeda per tipe soal:
            - multiple_choice: key pilihan, contoh "A"
            - fill_blank: string jawaban, contoh "diselesaikan"
            - drag_drop: array urutan kata, contoh ["Berapa", "harganya", "Pak", "?"]
          example: "A"

    AnswerResponse:
      type: object
      properties:
        is_correct:
          type: boolean
          example: true
        correct_answer:
          description: Jawaban benar dalam format yang sama dengan request
          example: "A"
        feedback_correct:
          type: string
          description: Penjelasan jika jawaban benar
          example: "Benar! Subjek aktif menjadi pelengkap 'oleh', objek aktif menjadi subjek pasif."
        feedback_wrong:
          type: string
          description: Penjelasan jika jawaban salah
          example: "Kurang tepat. Dalam kalimat pasif, objek aktif menjadi subjek."
        xp_gained:
          type: integer
          description: XP yang didapat jika jawaban benar, 0 jika salah
          example: 10

    FinishSessionRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: integer
          example: 42

    FinishSessionResponse:
      type: object
      properties:
        session_id:
          type: integer
          example: 42
        topic_name:
          type: string
          example: Kalimat Pasif
        correct_count:
          type: integer
          example: 4
        total_questions:
          type: integer
          example: 5
        score_percent:
          type: integer
          description: Persentase skor bulat, contoh 80 = 80%
          example: 80
        xp_gained:
          type: integer
          example: 40
        streak:
          type: integer
          description: Streak harian user setelah sesi selesai
          example: 5
        skills_updated:
          type: array
          items:
            type: object
            properties:
              skill:
                type: string
                enum: [kosakata, grammar, menyimak]
                example: grammar
              old_score:
                type: integer
                example: 60
              new_score:
                type: integer
                example: 64

    # ── ERROR ────────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        message:
          type: string
          example: Pesan error

  responses:
    Unauthorized:
      description: Token tidak ada atau kadaluarsa
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Authentication credentials were not provided

# ── PATHS ────────────────────────────────────────────────────────────────────

paths:
  # AUTH

  /api/auth/register/:
    post:
      tags: [Auth]
      summary: Register akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirm]
              properties:
                name:
                  type: string
                  example: Ahmad Khalid
                email:
                  type: string
                  format: email
                  example: ahmad@uiii.ac.id
                password:
                  type: string
                  minLength: 8
                  example: password123
                password_confirm:
                  type: string
                  example: password123
      responses:
        "201":
          description: Register berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registrasi berhasil
                  user:
                    $ref: "#/components/schemas/UserObject"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                email_taken:
                  summary: Email sudah terdaftar
                  value:
                    message: Email sudah terdaftar
                password_mismatch:
                  summary: Password tidak cocok
                  value:
                    message: Password dan konfirmasi password tidak cocok

  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Login dan dapatkan JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: ahmad@uiii.ac.id
                password:
                  type: string
                  example: password123
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: "#/components/schemas/UserObject"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Email atau password salah

  /api/auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Perbarui access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: Access token baru berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: Refresh token tidak valid atau kadaluarsa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Refresh token tidak valid atau kadaluarsa

  /api/auth/logout/:
    post:
      tags: [Auth]
      summary: Logout dan invalidate refresh token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout berhasil
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ONBOARDING

  /api/user/onboarding/:
    post:
      tags: [Onboarding]
      summary: Isi data awal setelah register
      description: |
        Dipanggil sekali setelah register berhasil.
        Mengisi country dan initial_level pada USER.
        Setelah berhasil, is_onboarded berubah menjadi true.
        Jika sudah pernah onboarding, return 400.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
            examples:
              saudi_a1:
                summary: Mahasiswa dari Saudi Arabia level A1
                value:
                  country: Saudi Arabia
                  initial_level: A1
              nigeria_a2:
                summary: Mahasiswa dari Nigeria level A2
                value:
                  country: Nigeria
                  initial_level: A2
      responses:
        "200":
          description: Onboarding berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Onboarding berhasil
                  user:
                    $ref: "#/components/schemas/UserObject"
        "400":
          description: Sudah pernah onboarding atau validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                already_onboarded:
                  summary: Sudah pernah onboarding
                  value:
                    message: User sudah pernah melakukan onboarding
                invalid_level:
                  summary: Level tidak valid
                  value:
                    message: initial_level harus A1 atau A2
        "401":
          $ref: "#/components/responses/Unauthorized"

  # DASHBOARD

  /api/dashboard/:
    get:
      tags: [Dashboard]
      summary: Ambil data beranda utama user
      description: |
        Mengembalikan semua data yang dibutuhkan halaman dashboard:
        - Greeting dengan nama dan tanggal
        - Level CEFR dan XP progress
        - Skill scores (kosakata, grammar, menyimak)
        - Streak harian 7 hari terakhir
        - Rekomendasi topik hari ini dari algoritma adaptif
        - Ringkasan aktivitas minggu ini
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Data dashboard berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
              example:
                greeting:
                  name: Andi
                  date: Kamis, 23 April 2026
                  new_topics_count: 3
                level:
                  cefr: B1
                  label: Menengah
                  total_xp: 1240
                  next_level_xp: 2000
                  xp_remaining: 620
                streak:
                  count: 4
                  days:
                    - { day: Sen, date: "2026-04-21", is_active: true }
                    - { day: Sel, date: "2026-04-22", is_active: true }
                    - { day: Rab, date: "2026-04-23", is_active: true }
                    - { day: Kam, date: "2026-04-24", is_active: true }
                    - { day: Jum, date: "2026-04-25", is_active: false }
                    - { day: Sab, date: "2026-04-26", is_active: false }
                    - { day: Min, date: "2026-04-27", is_active: false }
                skills:
                  - {
                      skill: kosakata,
                      score: 78,
                      delta_this_week: 5,
                      status: Bagus,
                    }
                  - {
                      skill: grammar,
                      score: 64,
                      delta_this_week: 2,
                      status: Bagus,
                    }
                  - {
                      skill: menyimak,
                      score: 51,
                      delta_this_week: 0,
                      status: Perlu latihan,
                    }
                recommended_topics:
                  - {
                      id: 3,
                      name: Kata Sambung,
                      skill: kosakata,
                      total_questions: 10,
                      estimated_minutes: 8,
                    }
                  - {
                      id: 5,
                      name: Kalimat Pasif,
                      skill: grammar,
                      total_questions: 12,
                      estimated_minutes: 10,
                    }
                  - {
                      id: 7,
                      name: Percakapan Formal,
                      skill: menyimak,
                      total_questions: 8,
                      estimated_minutes: 12,
                    }
                activity_summary:
                  sessions_this_week: 7
                  total_questions_answered: 143
                  average_score: 82
                  cefr_level: B1
                  cefr_label: Menengah
                  strongest_skill: kosakata
                  xp_today: 80
        "401":
          $ref: "#/components/responses/Unauthorized"

  # QUIZ

  /api/quiz/{topic_id}/start/:
    get:
      tags: [Quiz]
      summary: Mulai sesi latihan soal
      description: |
        Membuat sesi baru dan mengembalikan semua soal yang dipilih
        oleh algoritma adaptif berdasarkan kelemahan user.

        Tipe soal yang dikembalikan:
        - multiple_choice — ada field options (array A-D), context opsional
        - fill_blank — user ketik jawaban, context opsional
        - drag_drop — ada field words (array kata yang perlu disusun)
      security:
        - BearerAuth: []
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      responses:
        "200":
          description: Sesi berhasil dimulai
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSessionResponse"
              example:
                session_id: 42
                topic:
                  id: 5
                  name: Kalimat Pasif
                  skill: grammar
                  level: B1 Menengah
                total_questions: 5
                questions:
                  - id: 12
                    order: 1
                    type: multiple_choice
                    skill: grammar
                    text: "Pilih kalimat pasif yang paling tepat untuk kalimat aktif berikut:"
                    context: '"Ibu memasak nasi goreng untuk sarapan."'
                    options:
                      - {
                          key: A,
                          value: "Nasi goreng dimasak oleh ibu untuk sarapan.",
                        }
                      - {
                          key: B,
                          value: "Ibu dimasak nasi goreng untuk sarapan.",
                        }
                      - {
                          key: C,
                          value: "Nasi goreng memasak ibu untuk sarapan.",
                        }
                      - {
                          key: D,
                          value: "Sarapan dimasak nasi goreng oleh ibu.",
                        }
                    words: null
                  - id: 15
                    order: 2
                    type: fill_blank
                    skill: grammar
                    text: "Lengkapi kalimat berikut:"
                    context: '"Proyek itu ___ oleh tim kami minggu lalu."'
                    options: null
                    words: null
                  - id: 18
                    order: 3
                    type: drag_drop
                    skill: grammar
                    text: "Susun kata-kata berikut menjadi kalimat pasif yang benar:"
                    context: null
                    options: null
                    words: ["ditangkap", "Pencuri", "polisi", "oleh"]
        "404":
          description: Topik tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Topik tidak ditemukan
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/quiz/{topic_id}/answer/:
    post:
      tags: [Quiz]
      summary: Kirim jawaban satu soal
      description: |
        Mengirim jawaban untuk satu soal dan mendapat feedback langsung.

        Format field answer berbeda per tipe soal:
        - multiple_choice → string key pilihan, contoh "A"
        - fill_blank → string jawaban, contoh "diselesaikan"
        - drag_drop → array urutan kata, contoh ["Pencuri", "ditangkap", "oleh", "polisi"]
      security:
        - BearerAuth: []
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerRequest"
            examples:
              multiple_choice:
                summary: Jawaban pilihan ganda
                value:
                  session_id: 42
                  question_id: 12
                  answer: "A"
              fill_blank:
                summary: Jawaban isian
                value:
                  session_id: 42
                  question_id: 15
                  answer: "diselesaikan"
              drag_drop:
                summary: Jawaban drag-and-drop
                value:
                  session_id: 42
                  question_id: 18
                  answer: ["Pencuri", "ditangkap", "oleh", "polisi"]
      responses:
        "200":
          description: Jawaban diterima dan feedback dikirim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResponse"
              examples:
                correct:
                  summary: Jawaban benar
                  value:
                    is_correct: true
                    correct_answer: "A"
                    feedback_correct: "Benar! Subjek aktif menjadi pelengkap 'oleh', objek aktif menjadi subjek pasif."
                    feedback_wrong: null
                    xp_gained: 10
                wrong:
                  summary: Jawaban salah
                  value:
                    is_correct: false
                    correct_answer: "A"
                    feedback_correct: null
                    feedback_wrong: "Kurang tepat. Dalam kalimat pasif, objek aktif (nasi goreng) menjadi subjek."
                    xp_gained: 0
        "400":
          description: Session tidak valid atau sudah selesai
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Session tidak valid atau sudah selesai
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/quiz/{topic_id}/finish/:
    post:
      tags: [Quiz]
      summary: Selesaikan sesi latihan
      description: |
        Mengakhiri sesi latihan dan memperbarui:
        - Skor per skill (kosakata, grammar, menyimak)
        - Total XP user
        - Streak harian user

        Mengembalikan ringkasan hasil sesi yang ditampilkan di layar selesai.
      security:
        - BearerAuth: []
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinishSessionRequest"
      responses:
        "200":
          description: Sesi berhasil diselesaikan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishSessionResponse"
              example:
                session_id: 42
                topic_name: Kalimat Pasif
                correct_count: 4
                total_questions: 5
                score_percent: 80
                xp_gained: 40
                streak: 5
                skills_updated:
                  - { skill: grammar, old_score: 60, new_score: 64 }
        "400":
          description: Session tidak valid atau sudah selesai sebelumnya
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Session tidak valid atau sudah selesai
        "401":
          $ref: "#/components/responses/Unauthorized"
