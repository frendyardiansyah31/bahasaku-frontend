openapi: 3.0.3

info:
  title: BahasaKu API
  version: 1.0.0
  description: API platform latihan Bahasa Indonesia adaptif untuk mahasiswa asing UIII.

servers:
  - url: http://localhost:8000
    description: Local Development
  - url: https://frendyardiansyah31-bahasaku-backend.hf.space
    description: Production (Hugging Face Spaces)

tags:
  - name: Auth
    description: Register, login, logout, refresh token
  - name: Onboarding
    description: Pengisian data awal setelah register — country dan initial level

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ahmad Khalid
        email:
          type: string
          example: ahmad@uiii.ac.id
        role:
          type: string
          enum: [user, instructor, admin]
          example: user
        is_onboarded:
          type: boolean
          example: false
        country:
          type: string
          nullable: true
          example: Saudi Arabia
        initial_level:
          type: string
          nullable: true
          enum: [A1, A2]
          example: A1

    OnboardingRequest:
      type: object
      required: [country, initial_level]
      properties:
        country:
          type: string
          example: Saudi Arabia
        initial_level:
          type: string
          enum: [A1, A2]
          example: A1

    Error:
      type: object
      properties:
        message:
          type: string
          example: Pesan error

  responses:
    Unauthorized:
      description: Token tidak ada atau kadaluarsa
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Authentication credentials were not provided

paths:
  /api/auth/register/:
    post:
      tags: [Auth]
      summary: Register akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirm]
              properties:
                name:
                  type: string
                  example: Ahmad Khalid
                email:
                  type: string
                  format: email
                  example: ahmad@uiii.ac.id
                password:
                  type: string
                  minLength: 8
                  example: password123
                password_confirm:
                  type: string
                  example: password123
      responses:
        "201":
          description: Register berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registrasi berhasil
                  user:
                    $ref: "#/components/schemas/UserObject"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                email_taken:
                  summary: Email sudah terdaftar
                  value:
                    message: Email sudah terdaftar
                password_mismatch:
                  summary: Password tidak cocok
                  value:
                    message: Password dan konfirmasi password tidak cocok

  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Login dan dapatkan JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: ahmad@uiii.ac.id
                password:
                  type: string
                  example: password123
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: "#/components/schemas/UserObject"
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Email atau password salah

  /api/auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Perbarui access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: Access token baru berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: Refresh token tidak valid atau kadaluarsa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Refresh token tidak valid atau kadaluarsa

  /api/auth/logout/:
    post:
      tags: [Auth]
      summary: Logout dan invalidate refresh token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout berhasil
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/user/onboarding/:
    post:
      tags: [Onboarding]
      summary: Isi data awal setelah register
      description: |
        Dipanggil sekali setelah register berhasil.
        Mengisi country dan initial_level pada USER.
        Setelah berhasil, is_onboarded berubah menjadi true.
        Jika sudah pernah onboarding, return 400.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
            examples:
              saudi_a1:
                summary: Mahasiswa dari Saudi Arabia level A1
                value:
                  country: Saudi Arabia
                  initial_level: A1
              nigeria_a2:
                summary: Mahasiswa dari Nigeria level A2
                value:
                  country: Nigeria
                  initial_level: A2
      responses:
        "200":
          description: Onboarding berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Onboarding berhasil
                  user:
                    $ref: "#/components/schemas/UserObject"
        "400":
          description: Sudah pernah onboarding atau validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                already_onboarded:
                  summary: Sudah pernah onboarding
                  value:
                    message: User sudah pernah melakukan onboarding
                invalid_level:
                  summary: Level tidak valid
                  value:
                    message: initial_level harus A1 atau A2
        "401":
          $ref: "#/components/responses/Unauthorized"
